<!DOCTYPE html>
<html>
<head>
  <title>Campus Permission Portal</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f7fb;
      text-align: center;
      margin: 0;
    }

    h1 {
      margin-top: 30px;
      font-size: 28px;
      color: #1f2937;
    }

    p { 
      color: gray;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      margin-top: 30px;
    }

    .card {
      width: 85%;
      max-width: 350px;
      background: white;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      text-decoration: none;
      color: black;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .icon {
      font-size: 40px;
      margin-bottom: 10px;
    }

    .student { color: #3b82f6; }
    .faculty { color: #10b981; }
    .warden { color: #8b5cf6; }

    h2 {
      margin: 10px 0;
    }

  </style>
</head>
<body>

<h1>VTU Campus Permission Portal</h1>
<p>Secure and streamlined permission management</p>

<div class="container">

  <a href="student.html" class="card">
    <div class="icon student">👤</div>
    <h2>Student Portal</h2>
    <p>Access your dashboard and submit requests</p>
  </a>

  <a href="faculty.html" class="card">
    <div class="icon faculty">🎓</div>
    <h2>Faculty Portal</h2>
    <p>View and manage student permissions</p>
  </a>

  <a href="#" class="card">
    <div class="icon warden">🛡️</div>
    <h2>Warden Portal</h2>
    <p>Monitor hostel permissions and security</p>
  </a>

</div>

</body>
</html>

<a href="login.html">Student Portal</a>
<a href="faculty.html">Faculty Portal</a>
